<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter — सुजस Economics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #f8fafc; }
    @media print {
      .nav, .post-breadcrumb, .post-actions { display: none !important; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

<!-- ── Nav ──────────────────────────────────────────────────────────────────── -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">सुजस <span>Notes</span></a>
    <div class="nav-center">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html" class="nav-link">सुजस</a>
      <a href="economics.html" class="nav-link">Economics Survey</a>
    </div>
    <div class="nav-right">
      <a href="admin.html" class="nav-btn">Admin</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile" id="navMobile">
    <a href="index.html" class="nav-link">Home</a>
    <a href="index.html" class="nav-link">सुजस</a>
    <a href="economics.html" class="nav-link">Economics Survey</a>
    <a href="admin.html" class="nav-btn">Admin</a>
  </div>
</nav>

<!-- ── Page ─────────────────────────────────────────────────────────────────── -->
<main class="page">
  <div class="reading-wrap">

    <!-- Loading -->
    <div id="loadingState" class="state-box">
      <div class="icon"><span class="spinner"></span></div>
      <p>Loading chapter…</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="state-box" style="display:none;">
      <div class="icon">⚠️</div>
      <p id="errorMsg">Something went wrong.</p>
      <a href="economics.html" class="btn btn-outline" style="margin-top:16px;">
        ← Back to chapters
      </a>
    </div>

    <!-- Content -->
    <div id="chapterContent" style="display:none;">

      <!-- Breadcrumb -->
      <nav class="post-breadcrumb" aria-label="Breadcrumb">
        <a href="economics.html">← Economics Survey</a>
        <span class="sep">/</span>
        <span id="breadcrumbName" style="color:var(--text-muted);"></span>
      </nav>

      <!-- Hero -->
      <header class="post-hero">
        <div class="meta">
          <span class="badge" id="chapterBadge">Economics Survey</span>
        </div>
        <h1 id="chapterTitle"></h1>
        <p id="chapterTitleHindi" style="font-size:1.15rem;color:var(--text-muted);margin:4px 0 0;display:none;"></p>
        <div class="post-meta-row">
          <div class="post-meta-item">
            <span class="icon">📌</span>
            <span id="chapterTopic" style="color:var(--text-muted);"></span>
          </div>
          <div class="post-actions">
            <button class="btn btn-ghost btn-sm" onclick="window.print()">
              🖨 Print
            </button>
          </div>
        </div>
      </header>

      <!-- YouTube embed -->
      <div id="youtubeWrap" style="display:none;margin-bottom:32px;">
        <div style="position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;background:#000;">
          <iframe id="youtubeFrame"
                  style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
                  allowfullscreen
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  title="Economics Survey Video"></iframe>
        </div>
      </div>

      <!-- Body — iframe so uploaded CSS/JS runs correctly -->
      <iframe id="chapterBody"
              style="width:100%;border:none;display:block;min-height:200px;"
              scrolling="no"
              title="Chapter content"></iframe>

      <!-- Footer nav -->
      <div style="margin-top:48px; padding-top:24px; border-top:1px solid var(--border);
                  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
        <a href="economics.html" class="btn btn-ghost">← Back to chapters</a>
        <button class="btn btn-ghost" onclick="window.scrollTo({top:0,behavior:'smooth'})">
          ↑ Back to top
        </button>
      </div>

    </div>
  </div>
</main>

<script src="app.js"></script>
<script>
  async function loadChapter() {
    const params = new URLSearchParams(location.search);
    const id     = parseInt(params.get('id'), 10);

    if (!id || isNaN(id)) {
      showError('No chapter specified. Use ?id=N.');
      return;
    }

    try {
      const c = await api.getChapter(id);
      render(c);
    } catch (err) {
      showError(err.message || 'Could not load chapter.');
    }
  }

  function getYoutubeEmbedUrl(url) {
    if (!url) return null;
    try {
      const u = new URL(url);
      let videoId = null;
      if (u.hostname.includes('youtube.com')) {
        videoId = u.searchParams.get('v');
        if (!videoId && u.pathname.startsWith('/embed/')) {
          videoId = u.pathname.split('/embed/')[1];
        }
      } else if (u.hostname === 'youtu.be') {
        videoId = u.pathname.slice(1);
      }
      return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
    } catch { return null; }
  }

  function render(c) {
    document.title = `Chapter ${c.chapter_no}: ${c.chapter_name} — सुजस Economics`;

    document.getElementById('breadcrumbName').textContent   = c.chapter_name;
    document.getElementById('chapterBadge').textContent     = `Chapter ${c.chapter_no}`;
    document.getElementById('chapterTitle').textContent     = c.chapter_name;
    document.getElementById('chapterTopic').textContent     = c.topic;
    if (c.chapter_name_hindi) {
      const hindiEl = document.getElementById('chapterTitleHindi');
      hindiEl.textContent     = c.chapter_name_hindi;
      hindiEl.style.display   = '';
    }

    const embedUrl = getYoutubeEmbedUrl(c.youtube_url);
    if (embedUrl) {
      document.getElementById('youtubeFrame').src        = embedUrl;
      document.getElementById('youtubeWrap').style.display = '';
    }

    const frame = document.getElementById('chapterBody');
    frame.srcdoc = c.content_html;
    frame.addEventListener('load', function onLoad() {
      frame.removeEventListener('load', onLoad);
      try {
        frame.style.height = frame.contentDocument.documentElement.scrollHeight + 'px';
      } catch (e) {
        frame.style.height = '800px';
      }
    });

    document.getElementById('loadingState').style.display  = 'none';
    document.getElementById('chapterContent').style.display = '';
  }

  function showError(msg) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorMsg').textContent       = msg;
    document.getElementById('errorState').style.display  = '';
  }

  loadChapter();
</script>
</body>
</html>
