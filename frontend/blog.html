<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — सुजस Notes</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { background: #f8fafc; }

    /* ── Blog list ─────────────────────────────────────────────────────────── */
    .blog-hero {
      background: linear-gradient(135deg, var(--palette-1) 0%, var(--palette-2) 100%);
      color: #fff;
      padding: 56px 24px 48px;
      text-align: center;
    }
    .blog-hero h1 { font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 800; margin-bottom: 10px; }
    .blog-hero p  { opacity: .85; font-size: 1.05rem; }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .blog-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform .22s var(--ease), box-shadow .22s var(--ease);
      box-shadow: var(--shadow-sm);
    }
    @media(hover:hover){
      .blog-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-md);
      }
      .blog-card:hover .blog-card-title { color: var(--primary); }
    }
    .blog-card-date  { font-size: .75rem; color: var(--text-muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .blog-card-title { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.4; }
    .blog-card-excerpt { font-size: .9rem; color: var(--text-muted); line-height: 1.6; flex: 1; }
    .blog-card-footer { margin-top: 8px; }
    .blog-read-btn { font-size: .82rem; font-weight: 600; color: var(--primary); }

    /* ── Blog post ─────────────────────────────────────────────────────────── */
    .blog-post-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .blog-post-back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: .875rem; text-decoration: none; margin-bottom: 28px; font-weight: 500; }
    .blog-post-back:hover { color: var(--primary); }
    .blog-post-date { font-size: .78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .blog-post-title { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; color: var(--text); line-height: 1.25; margin-bottom: 20px; }
    .blog-post-divider { border: none; border-top: 2px solid var(--border-light); margin: 28px 0; }

    /* ── Content typography ────────────────────────────────────────────────── */
    .blog-content { font-size: 1rem; line-height: 1.8; color: var(--text-sub); }
    .blog-content h1,.blog-content h2,.blog-content h3 { color: var(--text); font-weight: 700; margin: 1.6em 0 .6em; line-height: 1.3; }
    .blog-content h1 { font-size: 1.7rem; }
    .blog-content h2 { font-size: 1.35rem; }
    .blog-content h3 { font-size: 1.1rem; }
    .blog-content p  { margin-bottom: 1.1em; }
    .blog-content ul,.blog-content ol { padding-left: 1.6em; margin-bottom: 1.1em; }
    .blog-content li { margin-bottom: .4em; }
    .blog-content a  { color: var(--primary); text-decoration: underline; }
    .blog-content blockquote {
      border-left: 4px solid var(--palette-3);
      padding: 12px 18px;
      margin: 1.5em 0;
      background: var(--surface-alt);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .blog-content pre {
      background: #0d1117;
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
      margin: 1.4em 0;
      border: 1px solid #30363d;
    }
    .blog-content pre code {
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: .875rem;
      line-height: 1.7;
      background: none;
      padding: 0;
    }
    .blog-content code:not(pre code) {
      background: #f0f0ff;
      color: #6366f1;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: .85em;
      font-family: 'Fira Code', monospace;
      border: 1px solid #e0e0ff;
    }
    .blog-content img { max-width: 100%; border-radius: var(--radius); margin: 1em 0; }
    .blog-content table { width: 100%; border-collapse: collapse; margin: 1.4em 0; font-size: .9rem; }
    .blog-content th,.blog-content td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
    .blog-content th { background: var(--surface-alt); font-weight: 600; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">सुजस <span>Notes</span></a>
    <div class="nav-center">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html" class="nav-link">सुजस</a>
      <a href="economics.html" class="nav-link">Economics Survey</a>
      <a href="blog.html" class="nav-link active">Blog</a>
    </div>
    <div class="nav-right">
      <a href="admin.html" class="nav-btn">Admin</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile" id="navMobile">
    <a href="index.html" class="nav-link">Home</a>
    <a href="index.html" class="nav-link">सुजस</a>
    <a href="economics.html" class="nav-link">Economics Survey</a>
    <a href="blog.html" class="nav-link">Blog</a>
    <a href="admin.html" class="nav-btn">Admin</a>
  </div>
</nav>

<!-- ── Blog list view ─────────────────────────────────────────────────────── -->
<div id="listView">
  <div class="blog-hero anim">
    <h1>📝 Blog</h1>
    <p>Articles, guides, and code snippets from the सुजस team.</p>
  </div>

  <div id="listContent">
    <!-- skeleton -->
    <div class="blog-grid">
      <div class="sk-card"><div class="sk sk-date"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-sm"></div></div>
      <div class="sk-card"><div class="sk sk-date"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-sm"></div></div>
      <div class="sk-card"><div class="sk sk-date"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line sk-line-sm"></div></div>
    </div>
  </div>
</div>

<!-- ── Single post view ───────────────────────────────────────────────────── -->
<div id="postView" style="display:none;">
  <main class="blog-post-wrap">
    <a href="blog.html" class="blog-post-back">← Back to Blog</a>
    <div id="postLoading">
      <div class="sk sk-date" style="width:120px;margin-bottom:14px;"></div>
      <div class="sk sk-post-title" style="margin-bottom:10px;"></div>
      <div class="sk sk-post-title sk-post-title-sm" style="margin-bottom:24px;"></div>
      <div class="sk sk-para"></div><div class="sk sk-para"></div><div class="sk sk-para sk-para-md"></div>
    </div>
    <div id="postInner" style="display:none;">
      <p class="blog-post-date" id="postDate"></p>
      <h1 class="blog-post-title" id="postTitle"></h1>
      <hr class="blog-post-divider" />
      <!-- iframe renders HTML+scripts properly; innerHTML silently drops <script> tags -->
      <iframe id="postFrame"
              style="width:100%;border:none;display:block;min-height:200px;"
              scrolling="no"
              title="Blog post content"></iframe>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const slug   = params.get('slug');

if (slug) {
  // Single post view
  document.getElementById('listView').style.display = 'none';
  document.getElementById('postView').style.display = '';
  document.title = 'Blog — सुजस';

  api._fetch(`/blog/${encodeURIComponent(slug)}`)
    .then(post => {
      document.title = `${post.title} — सुजस`;
      document.getElementById('postDate').textContent  = formatDate(post.created_at.split('T')[0]);
      document.getElementById('postTitle').textContent = post.title;

      // Render in iframe so <script> tags execute and styles are scoped.
      // hljs + base styles are injected into the srcdoc so code blocks
      // are highlighted and the content looks consistent.
      const frame = document.getElementById('postFrame');
      frame.srcdoc = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"><\/script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;font-size:1rem;line-height:1.8;
       color:#3d3d3d;background:#fff;padding:4px 0 24px;}
  h1,h2,h3,h4{color:#1a1a1a;font-weight:700;margin:1.5em 0 .5em;line-height:1.3;}
  h1{font-size:1.7rem;}h2{font-size:1.35rem;}h3{font-size:1.1rem;}
  p{margin-bottom:1em;}
  ul,ol{padding-left:1.6em;margin-bottom:1em;}
  li{margin-bottom:.35em;}
  a{color:#6366f1;text-decoration:underline;}
  blockquote{border-left:4px solid #c4b5fd;padding:12px 18px;margin:1.4em 0;
             background:#f8f7ff;border-radius:0 8px 8px 0;color:#6b7280;font-style:italic;}
  pre{background:#0d1117;border-radius:10px;padding:20px;overflow-x:auto;
      margin:1.4em 0;border:1px solid #30363d;}
  pre code{font-family:'Fira Code','Cascadia Code',Consolas,monospace;
           font-size:.875rem;line-height:1.7;background:none;padding:0;color:inherit;}
  code:not(pre code){background:#f0f0ff;color:#6366f1;padding:2px 7px;
      border-radius:4px;font-size:.85em;font-family:'Fira Code',monospace;
      border:1px solid #e0e0ff;}
  img{max-width:100%;border-radius:8px;margin:.8em 0;}
  table{width:100%;border-collapse:collapse;margin:1.4em 0;font-size:.9rem;}
  th,td{border:1px solid #e8e8e8;padding:10px 14px;text-align:left;}
  th{background:#f8f7ff;font-weight:600;}
  hr{border:none;border-top:2px solid #f0f0f0;margin:2em 0;}
</style>
</head>
<body>
${post.content_html}
<script>
  // Highlight all code blocks
  document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  // Auto-resize: post height to parent so no scrollbar appears
  function resize() {
    const h = document.documentElement.scrollHeight;
    window.parent.postMessage({type:'blog-resize',height:h},'*');
  }
  window.addEventListener('load', resize);
  new MutationObserver(resize).observe(document.body,{childList:true,subtree:true,attributes:true});
<\/script>
</body>
</html>`;

      // Listen for height messages from iframe
      window.addEventListener('message', function onMsg(e) {
        if (e.data && e.data.type === 'blog-resize') {
          frame.style.height = e.data.height + 'px';
        }
      });

      document.getElementById('postLoading').style.display = 'none';
      document.getElementById('postInner').style.display   = '';
    })
    .catch(err => {
      document.getElementById('postLoading').innerHTML =
        `<div class="state-box"><div class="icon">⚠️</div><p>${err.message}</p></div>`;
    });

} else {
  // Blog list view
  api._fetch('/blog/?page_size=50')
    .then(data => {
      const posts = data.results;
      if (!posts.length) {
        document.getElementById('listContent').innerHTML =
          '<div class="state-box" style="margin:60px auto;"><div class="icon">📭</div><p>No posts yet.</p></div>';
        return;
      }
      document.getElementById('listContent').innerHTML = `
        <div class="blog-grid">
          ${posts.map((p, i) => {
            const d = i < 4 ? ` anim anim-d${i+1}` : ' anim';
            return `
            <a class="blog-card${d}" href="blog.html?slug=${encodeURIComponent(p.slug)}">
              <span class="blog-card-date">${formatDate(p.created_at.split('T')[0])}</span>
              <h2 class="blog-card-title">${escHtml(p.title)}</h2>
              ${p.excerpt ? `<p class="blog-card-excerpt">${escHtml(p.excerpt)}</p>` : ''}
              <div class="blog-card-footer"><span class="blog-read-btn">Read more →</span></div>
            </a>`;
          }).join('')}
        </div>`;
      animateOnScroll();
    })
    .catch(() => {
      document.getElementById('listContent').innerHTML =
        '<div class="state-box" style="margin:60px auto;"><div class="icon">⚠️</div><p>Could not load posts.</p></div>';
    });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
